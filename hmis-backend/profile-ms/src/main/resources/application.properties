spring.application.name=profile-ms
server.port=9092

logging.level.root=INFO

file.upload-dir=uploads/avatars
app.public-base-url=http://localhost:9092

# ===============================
# Database Connection
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/profile_ms?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.pool-name=MyHikariPool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# ===============================
# Custom Application Exceptions
# ===============================
PATIENT_ALREADY_EXISTS=Patient already exists
PATIENT_NOT_FOUND=Patient not found

DOCTOR_ALREADY_EXISTS=Doctor already exists
DOCTOR_LICENSE_ALREADY_EXISTS=Doctor with this License already exists
DOCTOR_NOT_FOUND=Doctor not found


