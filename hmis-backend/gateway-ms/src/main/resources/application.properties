spring.application.name=gateway-ms
server.port=9090

logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping=TRACE

management.endpoints.web.exposure.include=*

spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin RETAIN_UNIQUE

spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowed-headers=*

# User Service
spring.cloud.gateway.server.webflux.routes[0].id=user-ms
# spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:9091
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-ms
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/user/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=TokenFilter
#spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

# Profile Service
spring.cloud.gateway.server.webflux.routes[1].id=profile-ms
# spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:9092
spring.cloud.gateway.server.webflux.routes[1].uri=lb://profile-ms
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/profile/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=TokenFilter
#spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1

# Profile Service - static avatar images (no TokenFilter: <img> requests
# can't attach an Authorization header, so this route stays public)
spring.cloud.gateway.server.webflux.routes[2].id=profile-ms-static
# spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:9092
spring.cloud.gateway.server.webflux.routes[2].uri=lb://profile-ms-static
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/static/avatars/**

# Appointment Service
spring.cloud.gateway.server.webflux.routes[3].id=appointment-ms
# spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:9093
spring.cloud.gateway.server.webflux.routes[3].uri=lb://appointment-ms
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/appointments/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=TokenFilter
#spring.cloud.gateway.server.webflux.routes[3].filters[0]=StripPrefix=1
