spring.application.name=appointment-ms
server.port=9093

logging.level.root=INFO

file.upload-dir=uploads/avatars
app.public-base-url=http://localhost:9093

# ===============================
# Database Connection
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/appointment_ms?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.pool-name=MyHikariPool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# ===============================
# Custom Application Exceptions
# ===============================
APPOINTMENT_NOT_FOUND=Appointment not found
APPOINTMENT_ALREADY_COMPLETED=Appointment is already completed
APPOINTMENT_ALREADY_CANCELLED=Appointment is already cancelled
APPOINTMENT_ALREADY_RESCHEDULED=Appointment is already rescheduled
APPOINTMENT_DATE_TIME_IN_PAST=Appointment date and time cannot be in the past
PATIENT_OR_DOCTOR_ID_MISSING=Patient ID or Doctor ID is required for scheduling an appointment

INVALID_APPOINTMENT_STATUS=Invalid appointment status. Allowed values are: SCHEDULED, COMPLETED, CANCELLED, RESCHEDULED

DOCTOR_PROFILE_NOT_FOUND=Doctor profile not found
PATIENT_PROFILE_NOT_FOUND=Patient profile not found